# DentalYOLO26m SSL pretraining model.
#
# Source detection YAML:
#   cfg/models/dental26/dental-yolo26m.yaml
#
# Keeps the YOLO26-P2 feature pyramid through layers 0-28, removes Detect, and
# adds a lightweight reconstruction decoder over P2/P3/P4/P5 features.

nc: 1
end2end: False
reg_max: 1
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  - [-1, 1, XRayEnhanceConv, [64, 2]]            # 0-P1/2
  - [-1, 1, XRayEnhanceConv, [128, 2]]           # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]            # 2
  - [-1, 1, XRayEnhanceConv, [256, 2]]           # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]            # 4
  - [-1, 1, Conv, [512, 3, 2]]                   # 5-P4/16
  - [-1, 2, C3k2, [512, True]]                   # 6
  - [-1, 1, Conv, [1024, 3, 2]]                  # 7-P5/32
  - [-1, 2, C3k2, [1024, True]]                  # 8
  - [-1, 1, SPPF, [1024, 5, 3, True]]            # 9
  - [-1, 1, LATDAA, [1024, 4, 32]]               # 10

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 11
  - [[-1, 6], 1, Concat, [1]]                    # 12 cat backbone P4
  - [-1, 2, C3k2, [512, True]]                   # 13

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 14
  - [[-1, 4], 1, Concat, [1]]                    # 15 cat backbone P3
  - [-1, 1, DRELAN, [256, 2]]                    # 16

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 17
  - [[-1, 2], 1, Concat, [1]]                    # 18 cat backbone P2
  - [-1, 2, C3k2, [128, True]]                   # 19 P2/4

  - [-1, 1, Conv, [128, 3, 2]]                   # 20
  - [[-1, 16], 1, Concat, [1]]                   # 21 cat head P3
  - [-1, 1, DRELAN, [256, 2]]                    # 22 P3/8

  - [-1, 1, Conv, [256, 3, 2]]                   # 23
  - [[-1, 13], 1, Concat, [1]]                   # 24 cat head P4
  - [-1, 2, C3k2, [512, True]]                   # 25 P4/16

  - [-1, 1, Conv, [512, 3, 2]]                   # 26
  - [[-1, 10], 1, Concat, [1]]                   # 27 cat head P5
  - [-1, 1, C3k2, [1024, True, 0.5, True]]       # 28 P5/32

  - [[19, 22, 25, 28], 1, DentalReconstructionDecoder, [1, 128, 4]] # 29 reconstruct 1ch image
